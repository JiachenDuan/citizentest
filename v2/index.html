<!doctype html>

  <style>
    :root {
      color-scheme: light;

      --ink: #1f1a14;
      --muted: #6b5f52;
      --card: #fffaf2;
      --accent: #b24a2b;
      --accent-2: #2b6e8f;
      --border: #e6dacb;
      --shadow: 0 10px 30px rgba(34, 20, 6, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Georgia", "Palatino", "Times New Roman", serif;
      background:
        radial-gradient(1200px 600px at 20% -10%, #fff6df 0%, transparent 60%),
        radial-gradient(900px 500px at 90% 10%, #f9e9d6 0%, transparent 55%),
        linear-gradient(180deg, #f7f2e9 0%, #efe6da 100%);
      color: var(--ink);
    }
    .app {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 20px 48px;
    }
    header {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 16px 18px 22px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }
    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0.4px;
    }
    .subtitle {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.4;
    }
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 0 8px;
      flex-wrap: wrap;
    }
    .pager {
      font-size: 16px;
      color: var(--muted);
    }
    .btns {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    button {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--ink);
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease;
      box-shadow: 0 6px 16px rgba(25, 18, 8, 0.08);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    button:not(:disabled):active {
      transform: translateY(1px);
      box-shadow: 0 3px 10px rgba(25, 18, 8, 0.08);
    }
    .section {
      margin: 22px 0 6px;
      padding: 10px 14px;
      background: #f1e6d7;
      border-left: 6px solid var(--accent);
      border-radius: 10px;
      font-size: 20px;
      font-weight: 700;
    }
    .subsection {
      margin: 8px 0 12px;
      padding: 8px 12px;
      background: #f7efe4;
      border-left: 6px solid var(--accent-2);
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 16px 12px;
      margin: 12px 0;
      box-shadow: var(--shadow);
    }
    .question {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .num {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      min-width: 38px;
    }
    .qtext {
      flex: 1;
      cursor: pointer;
    }
    .en {
      font-size: 20px;
      line-height: 1.45;
    }
    .zh {
      margin-top: 4px;
      font-size: 19px;
      line-height: 1.55;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Heiti SC", "SimSun", sans-serif;
      color: #2a2a2a;
    }
    .badge {
      display: inline-block;
      margin-left: 8px;
      padding: 3px 8px;
      font-size: 12px;
      color: #fff;
      background: var(--accent);
      border-radius: 999px;
      vertical-align: middle;
    }
    .answers {
      margin: 12px 0 2px 38px;
      padding: 0;
      list-style: none;
    }
    .answers li {
      padding: 8px 10px;
      margin: 6px 0;
      background: #fff;
      border: 1px solid #efe2d2;
      border-radius: 10px;
      cursor: pointer;
    }
    .ansTop {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .ansText { flex: 1; }
    .ansExplainBtn {
      white-space: nowrap;
      padding: 8px 10px;
      font-size: 14px;
      border-radius: 10px;
      border: 1px solid #ead1b8;
      background: #fff6e9;
      box-shadow: none;
    }
    .ansLearnPanel {
      margin-top: 10px;
    }
    .ansLearnPanel .learnpanel {
      margin-left: 0;
      margin-right: 0;
    }
    .note {
      margin: 8px 0 2px 38px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }
    .hint {
      margin-top: 6px;
      font-size: 14px;
      color: var(--muted);
    }

    /* v2 learning/explain */
    .learnbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin: 10px 0 6px;
      padding-left: 38px;
    }
    .learnbtn {
      padding: 10px 14px;
      font-size: 16px;
      border-radius: 12px;
      border:  1px solid var(--border);
      background: #fff;
    }
    .learnbtn.primary {
      background: #fff3e3;
      border-color: #ead1b8;
    }
    .learnpanel {
      margin: 10px 0 12px 38px;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid #ead1b8;
      background: #fff6e9;
    }
    .learnTitle {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 10px;
      color: #3b2f24;
    }
    .chunks {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 10px 0 12px;
    }
    .chunk {
      border: 1px solid #f0ddc8;
      background: #fff;
      border-radius: 12px;
      padding: 10px 12px;
    }
    .chunkEn {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .chunkZh {
      font-size: 18px;
      line-height: 1.5;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Heiti SC", "SimSun", sans-serif;
      color: #2a2a2a;
    }
    .learnActions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .learnNote {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 8px;
    }

    @media (max-width: 720px) {
      .app { padding: 20px 14px 40px; }
      h1 { font-size: 24px; }
      .en { font-size: 18px; }
      .zh { font-size: 18px; }
      .num { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>US Civics 128 Q&A</h1>
      <div class="subtitle">English + 中文翻译。点击问题或答案即可朗读（可切换：英文 / 英文→中文 / 中文）。每页10题，共13页。</div>
      <div class="hint">提示：标有 * 的为 65/20 特别题。</div>
    </header>

    <div class="controls">
      <div class="pager" id="pager"></div>

      <div class="btns" style="gap:12px; flex-wrap:wrap;">
        <label style="display:flex; align-items:center; gap:8px; font-size:14px; color:var(--muted);">
          朗读：
          <select id="readMode" style="padding:8px 10px; border-radius:10px; border:1px solid var(--border); background:#fff; font-size:14px;">
            <option value="en">English only</option>
            <option value="both" selected>English → 中文</option>
            <option value="zh">中文 only</option>
          </select>
        </label>

        <label style="display:flex; align-items:center; gap:8px; font-size:14px; color:var(--muted);">
          English 速度：
          <input id="enRate" type="range" min="0.6" max="1.2" step="0.05" value="0.9" />
          <span id="enRateLabel" style="min-width:40px; text-align:right;">0.90×</span>
        </label>

        <label style="display:flex; align-items:center; gap:8px; font-size:14px; color:var(--muted);">
          本页连读：
          <select id="loopCount" style="padding:8px 10px; border-radius:10px; border:1px solid var(--border); background:#fff; font-size:14px;">
            <option value="1" selected>1遍</option>
            <option value="2">2遍</option>
            <option value="3">3遍</option>
            <option value="5">5遍</option>
            <option value="10">10遍</option>
            <option value="inf">无限循环</option>
          </select>
        </label>

        <button id="playPage">Play Page</button>
        <button id="stopPage" disabled>Stop</button>

        <button id="prev">Prev</button>
        <button id="next">Next</button>
      </div>
    </div>

    <div id="list"></div>
  </div>

":"(Put together)","zh":"意思是：\"权力分立\"——立法、行政、司法三权分别由不同部门掌管，防止权力集中。"}]}],"16":[{"summary":"这个答案的意思是：政府三个部门分别是：立法、行政和司法。","chunks":[{"en":"Legislative","zh":"立法的（立法机构，即国会）"},{"en":"executive","zh":"行政的（行政机构，即总统及其内阁）"},{"en":"judicial","zh":"司法的（司法机构，即法院）"},{"en":"(Put together)","zh":"意思是：政府三个部门分别是：立法、行政和司法。"}]},{"summary":"这个答案的意思是：三个部门具体是：国会、总统和法院。","chunks":[{"en":"Congress","zh":"国会（立法机构）"},{"en":"president","zh":"总统（行政机构的领导）"},{"en":"the courts","zh":"法院（司法机构）"},{"en":"(Put together)","zh":"意思是：三个部门具体是：国会、总统和法院。"}]}],"17":[{"summary":"这个答案的意思是：总统领导的是行政部门，负责执行法律、管理联邦政府。","chunks":[{"en":"Executive","zh":"行政的（executive = 执行、行政）"},{"en":"branch","zh":"分支、部门"},{"en":"(Put together)","zh":"意思是：总统领导的是行政部门，负责执行法律、管理联邦政府。"}]}],"18":[{"summary":"这个答案的意思是：（美国）国会负责制定联邦法律。","chunks":[{"en":"(U.S.)","zh":"美国的（可选）"},{"en":"Congress","zh":"国会；美国联邦立法机构，由参议院和众议院组成"},{"en":"(Put together)","zh":"意思是：（美国）国会负责制定联邦法律。"}]},{"summary":"这个答案的意思是：（美国/全国）立法机构——即国会——负责制定法律。","chunks":[{"en":"(U.S. or national)","zh":"（美国的或全国性的）——括号内可选"},{"en":"legislature","zh":"立法机构（专门用来制定法律的机构）"},{"en":"(Put together)","zh":"意思是：（美国/全国）立法机构——即国会——负责制定法律。"}]},{"summary":"这个答案的意思是：立法部门（即国会）负责起草和通过法律。","chunks":[{"en":"Legislative","zh":"立法的"},{"en":"branch","zh":"部门"},{"en":"(Put together)","zh":"意思是：立法部门（即国会）负责起草和通过法律。"}]}],"19":[{"summary":"这个答案的意思是：国会由参议院和众议院两部分组成，合称\"两院制\"。","chunks":[{"en":"Senate","zh":"参议院（每州2名参议员，共100名）"},{"en":"and House","zh":"和众议院"},{"en":"(of Representatives)","zh":"代表们的（Representatives = 众议员，括号内可选）"},{"en":"(Put together)","zh":"意思是：国会由参议院和众议院两部分组成，合称\"两院制\"。"}]}],"20":[{"summary":"这个答案的意思是：国会有权制定联邦法律。","chunks":[{"en":"Writes laws","zh":"制定法律（write 在此为\"起草/制定\"的意思）"},{"en":"(Put together)","zh":"意思是：国会有权制定联邦法律。"}]},{"summary":"这个答案的意思是：只有国会才有权正式宣战，而非总统单方面决定。","chunks":[{"en":"Declares","zh":"宣告、宣布（declare = 正式宣布）"},{"en":"war","zh":"战争"},{"en":"(Put together)","zh":"意思是：只有国会才有权正式宣战，而非总统单方面决定。"}]},{"summary":"这个答案的意思是：国会负责制定联邦政府的年度预算，掌控国家财政拨款。","chunks":[{"en":"Makes","zh":"制定"},{"en":"the federal budget","zh":"联邦预算（budget = 预算，指政府的财政计划）"},{"en":"(Put together)","zh":"意思是：国会负责制定联邦政府的年度预算，掌控国家财政拨款。"}]}],"21":[{"summary":"这个答案的意思是：全美共有100名参议员（每州2名 × 50个州 = 100名）。","chunks":[{"en":"One hundred","zh":"一百"},{"en":"(100)","zh":"数字写法"},{"en":"(Put together)","zh":"意思是：全美共有100名参议员（每州2名 × 50个州 = 100名）。"}]}],"22":[{"summary":"这个答案的意思是：美国参议员每届任期为6年，且没有连任次数限制。","chunks":[{"en":"Six","zh":"六"},{"en":"years","zh":"年"},{"en":"(Put together)","zh":"意思是：美国参议员每届任期为6年，且没有连任次数限制。"}]}],"23":[],"24":[{"summary":"这个答案的意思是：众议院共有435名有投票权的议员，各州的席位数量按人口比例分配。","chunks":[{"en":"Four hundred thirty-five","zh":"四百三十五"},{"en":"(435)","zh":"数字写法"},{"en":"(Put together)","zh":"意思是：众议院共有435名有投票权的议员，各州的席位数量按人口比例分配。"}]}],"25":[{"summary":"这个答案的意思是：众议员每届任期只有2年，比参议员（6年）短得多，需要更频繁地参加选举。","chunks":[{"en":"Two","zh":"两"},{"en":"years","zh":"年"},{"en":"(Put together)","zh":"意思是：众议员每届任期只有2年，比参议员（6年）短得多，需要更频繁地参加选举。"}]}],"26":[{"summary":"这个答案的意思是：众议员任期短是为了让他们更紧密地反映民意，每两年就要重新面对选民的检验。","chunks":[{"en":"To","zh":"为了（表目的）"},{"en":"more closely","zh":"更紧密地"},{"en":"follow","zh":"跟随、反映"},{"en":"public opinion","zh":"公众意见、民意（public = 公众的，opinion = 意见）"},{"en":"(Put together)","zh":"意思是：众议员任期短是为了让他们更紧密地反映民意，每两年就要重新面对选民的检验。"}]}],"27":[{"summary":"这个答案的意思是：无论大州小州，每个州都拥有2名参议员，体现各州在参议院的平等地位。","chunks":[{"en":"Two","zh":"两（名）"},{"en":"(Put together)","zh":"意思是：无论大州小州，每个州都拥有2名参议员，体现各州在参议院的平等地位。"}]}],"28":[{"summary":"这个答案的意思是：为了保证各州平等的代表权——特别是人口少的小州，在参议院与大州享有同等的席位。","chunks":[{"en":"Equal","zh":"平等的"},{"en":"representation","zh":"代表权、席位（representation = 被代表的权利）"},{"en":"(for small states)","zh":"（对小州而言）——括号内可选"},{"en":"(Put together)","zh":"意思是：为了保证各州平等的代表权——特别是人口少的小州，在参议院与大州享有同等的席位。"}]},{"summary":"这个答案的意思是：这一安排来源于\"大妥协\"——大州按人口决定众议院席位，各州在参议院则平等享有2席，两者结合形成今天的两院制。","chunks":[{"en":"The Great Compromise","zh":"大妥协方案（1787年制宪会议上达成的重要妥协）"},{"en":"(Connecticut Compromise)","zh":"（又称康涅狄格妥协）——括号内可选"},{"en":"(Put together)","zh":"意思是：这一安排来源于\"大妥协\"——大州按人口决定众议院席位，各州在参议院则平等享有2席，两者结合形成今天的两院制。"}]}],"29":[],"30":[],"31":[{"summary":"这个答案的意思是：参议员代表本州全体公民的利益，在联邦层面为本州发声。","chunks":[{"en":"Citizens","zh":"公民（这里泛指该州的居民/选民）"},{"en":"of their state","zh":"他们所在州的"},{"en":"(Put together)","zh":"意思是：参议员代表本州全体公民的利益，在联邦层面为本州发声。"}]},{"summary":"这个答案的意思是：参议员代表所在州的人民，为全州选民利益服务。","chunks":[{"en":"People","zh":"人民（与 citizens 含义相近，可互换）"},{"en":"of their state","zh":"他们所在州的"},{"en":"(Put together)","zh":"意思是：参议员代表所在州的人民，为全州选民利益服务。"}]}],"32":[{"summary":"这个答案的意思是：参议员由其所在州的公民（选民）通过直接选举产生。（1913年第17条修正案之前，参议员由州议会选出。）","chunks":[{"en":"Citizens","zh":"公民（有投票资格的选民）"},{"en":"from their state","zh":"来自（参议员所在的）州"},{"en":"(Put together)","zh":"意思是：参议员由其所在州的公民（选民）通过直接选举产生。（1913年第17条修正案之前，参议员由州议会选出。）"}]}],"33":[{"summary":"这个答案的意思是：众议员代表的是其国会选区内的公民，选区是按人口划分的地理区域。","chunks":[{"en":"Citizens","zh":"公民"},{"en":"in their (congressional) district","zh":"在他们（国会）选区内的（district = 选区；congressional = 国会的，可选）"},{"en":"(Put together)","zh":"意思是：众议员代表的是其国会选区内的公民，选区是按人口划分的地理区域。"}]},{"summary":"这个答案的意思是：众议员代表其所在选区的人民利益，是选区居民在国会的代言人。","chunks":[{"en":"People","zh":"人民（与 citizens 含义相近）"},{"en":"from their (congressional) district","zh":"来自（国会）选区的"},{"en":"(Put together)","zh":"意思是：众议员代表其所在选区的人民利益，是选区居民在国会的代言人。"}]}],"34":[{"summary":"这个答案的意思是：众议员由其国会选区内的公民直接选举产生，每两年选举一次。","chunks":[{"en":"Citizens","zh":"公民（选民）"},{"en":"from their (congressional) district","zh":"来自（国会）选区的"},{"en":"(Put together)","zh":"意思是：众议员由其国会选区内的公民直接选举产生，每两年选举一次。"}]}],"35":[{"summary":"这个答案的意思是：因为众议院席位按各州人口比例分配，人口越多的州，拥有的众议员席位就越多。","chunks":[{"en":"(Because of)","zh":"（因为）——括号内可选"},{"en":"the state's population","zh":"该州的人口（population = 人口总数）"},{"en":"(Put together)","zh":"意思是：因为众议院席位按各州人口比例分配，人口越多的州，拥有的众议员席位就越多。"}]},{"summary":"这个答案的意思是：因为那些州人口更多，所以分配到更多的众议院席位。","chunks":[{"en":"(Because)","zh":"（因为）——可选"},{"en":"they have more people","zh":"它们有更多的人口"},{"en":"(Put together)","zh":"意思是：因为那些州人口更多，所以分配到更多的众议院席位。"}]},{"summary":"这个答案的意思是：因为某些州的人口数量更多，在众议院中获得更多代表席位。","chunks":[{"en":"some states","zh":"某些州"},{"en":"have more people","zh":"有更多的人口"},{"e ,"zh":"报纸"},{"en":"(Put together)","zh":"意思是：向报纸投稿或写读者来信，通过媒体表达公民意见。"}]}],"70":[{"summary":"这个答案的意思是：积极参与投票是每位公民为国家做贡献的重要方式。","chunks":[{"en":"Vote","zh":"投票"},{"en":"(Put together)","zh":"意思是：积极参与投票是每位公民为国家做贡献的重要方式。"}]},{"summary":"这个答案的意思是：依法纳税是公民对国家的义务和贡献，税款用于资助政府服务和公共设施。","chunks":[{"en":"Pay","zh":"缴纳、支付"},{"en":"taxes","zh":"税款（tax 的复数）"},{"en":"(Put together)","zh":"意思是：依法纳税是公民对国家的义务和贡献，税款用于资助政府服务和公共设施。"}]},{"summary":"这个答案的意思是：守法是公民的基本义务，也是维护社会秩序的重要方式。","chunks":[{"en":"Obey","zh":"遵守"},{"en":"the law","zh":"法律"},{"en":"(Put together)","zh":"意思是：守法是公民的基本义务，也是维护社会秩序的重要方式。"}]},{"summary":"这个答案的意思是：参军服役，保卫国家安全。","chunks":[{"en":"Serve","zh":"服役"},{"en":"in the military","zh":"在军队中"},{"en":"(Put together)","zh":"意思是：参军服役，保卫国家安全。"}]},{"summary":"这个答案的意思是：竞选公职，直接参与政府管理，为公众服务。","chunks":[{"en":"Run for","zh":"竞选"},{"en":"office","zh":"公职"},{"en":"(Put together)","zh":"意思是：竞选公职，直接参与政府管理，为公众服务。"}]},{"summary":"这个答案的意思是：在政府机构任职（无论地方、州还是联邦层面），都是为国家和公众服务的方式。","chunks":[{"en":"Work for","zh":"为……工作"},{"en":"local","zh":"地方的（如市政府）"},{"en":"state","zh":"州的（州政府）"},{"en":"or federal government","zh":"或联邦政府"},{"en":"(Put together)","zh":"意思是：在政府机构任职（无论地方、州还是联邦层面），都是为国家和公众服务的方式。"}]}],"71":[{"summary":"这个答案的意思是：缴税是法律规定的义务，不缴税属于违法行为。","chunks":[{"en":"Required","zh":"被要求、规定（required = 必须做的）"},{"en":"by law","zh":"由法律规定（by = 被/由）"},{"en":"(Put together)","zh":"意思是：缴税是法律规定的义务，不缴税属于违法行为。"}]},{"summary":"这个答案的意思是：每个人的税款汇聚在一起，共同资助联邦政府运作，支持各类公共服务。","chunks":[{"en":"All people pay","zh":"所有人都缴纳"},{"en":"to fund","zh":"为……提供资金（fund = 资助）"},{"en":"the federal government","zh":"联邦政府"},{"en":"(Put together)","zh":"意思是：每个人的税款汇聚在一起，共同资助联邦政府运作，支持各类公共服务。"}]},{"summary":"这个答案的意思是：宪法第十六修正案授权国会征收联邦所得税，缴税是宪法规定的义务。","chunks":[{"en":"Required by","zh":"被……要求"},{"en":"the (U.S.) Constitution","zh":"（美国）宪法"},{"en":"(16th Amendment)","zh":"（第十六修正案）（括号内可选，指具体条款）"},{"en":"(Put together)","zh":"意思是：宪法第十六修正案授权国会征收联邦所得税，缴税是宪法规定的义务。"}]},{"summary":"这个答案的意思是：缴税是每位公民应尽的公民义务，体现对国家和社会的责任感。","chunks":[{"en":"Civic","zh":"公民的、公民义务的"},{"en":"duty","zh":"义务、责任"},{"en":"(Put together)","zh":"意思是：缴税是每位公民应尽的公民义务，体现对国家和社会的责任感。"}]}],"72":[{"summary":"这个答案的意思是：法律规定18至25岁男性必须进行兵役登记，不登记属于违法行为。","chunks":[{"en":"Required","zh":"被规定、被要求"},{"en":"by law","zh":"依法（由法律规定）"},{"en":"(Put together)","zh":"意思是：法律规定18至25岁男性必须进行兵役登记，不登记属于违法行为。"}]},{"summary":"这个答案的意思是：兵役登记是公民对国家应尽的义务，是公民责任感的体现。","chunks":[{"en":"Civic","zh":"公民的"},{"en":"duty","zh":"义务"},{"en":"(Put together)","zh":"意思是：兵役登记是公民对国家应尽的义务，是公民责任感的体现。"}]},{"summary":"这个答案的意思是：登记制度确保如果国家需要征兵时，可以公平地从所有符合条件的男性中进行选拔，而不是随意征召。","chunks":[{"en":"Makes","zh":"使……（动词）"},{"en":"the draft","zh":"征兵（draft = 强制征募士兵）"},{"en":"fair","zh":"公平的"},{"en":"if needed","zh":"如果需要的话"},{"en":"(Put together)","zh":"意思是：登记制度确保如果国家需要征兵时，可以公平地从所有符合条件的男性中进行选拔，而不是随意征召。"}]}],"73":[{"summary":"这个答案的意思是：许多人来到美洲是为了追求更多的个人自由，摆脱欧洲的各种束缚。","chunks":[{"en":"Freedom","zh":"自由"},{"en":"(Put together)","zh":"意思是：许多人来到美洲是为了追求更多的个人自由，摆脱欧洲的各种束缚。"}]},{"summary":"这个答案的意思是：寻求政治上的自由，希望拥有更多参与政治和自我管理的权利。","chunks":[{"en":"Political","zh":"政治的"},{"en":"liberty","zh":"自由（与freedom同义，强调权利层面）"},{"en":"(Put together)","zh":"意思是：寻求政治上的自由，希望拥有更多参与政治和自我管理的权利。"}]},{"summary":"这个答案的意思是：宗教自由是许多殖民者来美洲的主要原因，他们在欧洲因宗教信仰不同而受到迫害。","chunks":[{"en":"Religious","zh":"宗教的"},{"en":"freedom","zh":"自由"},{"en":"(Put together)","zh":"意思是：宗教自由是许多殖民者来美洲的主要原因，他们在欧洲因宗教信仰不同而受到迫害。"}]},{"summary":"这个答案的意思是：许多人来美洲是为了寻找更好的经济机会，如获得土地、从事贸易等。","chunks":[{"en":"Economic","zh":"经济的"},{"en":"opportunity","zh":"机会（opportunity = 机遇）"},{"en":"(Put together)","zh":"意思是：许多人来美洲是为了寻找更好的经济机会，如获得土地、从事贸易等。"}]},{"summary":"这个答案的意思是：一些人来到美洲是为了逃离在欧洲受到的宗教或政治迫害。","chunks":[{"en":"Escape","zh":"逃离、逃脱"},{"en":"persecution","zh":"迫害（指因政治、宗教、种族等原因遭受的打压和虐待）"},{"en":"(Put together)","zh":"意思是：一些人来到美洲是为了逃离在欧洲受到的宗教或政治迫害。"}]}],"74":[{"summary":"这个答案的意思是：美洲印第安人（原住民）在欧洲人到来前已在美洲生活了数千年，拥有丰富多样的文化和文明。","chunks":[{"en":"American","zh":"美洲的"},{"en":"Indians","zh":"印第安人（这是历史上对美洲原住民的旧称，今天更多称为Native Americans）"},{"en":"(Put together)","zh":"意思是：美洲印第安人（原住民）在欧洲人到来前已在美洲生活了数千年，拥有丰富多样的文化和文明。"}]},{"summary":"这个答案的意思是：美洲原住民是欧洲人到来前的美洲居民，\"Native Americans\"是现在更常用、更尊重的称呼。","chunks":[{"en":"Native","zh":"本地的、原生的（native = 土生土长的）"},{"en":"Americans","zh":"美洲人"},{"en":"(Put together)","zh":"意思是：美洲原住民是欧洲人到来前的美洲居民，\"Native Americans\"是现在更常用、更尊重的称呼。"}]}],"75":[{"summary":"这个答案的意思是：数百年间，数百万非洲人被强行抓走，通过奴隶贸易贩卖到美洲，这是美国历史上极为黑暗的一页。","chunks":[{"en":"Africans","zh":"非洲人"},{"en":"(Put together)","zh":"意思是：数百年间，数百万非洲人被强行抓走，通过奴隶贸易贩卖到美洲，这是美国历史上极为黑暗的一页。"}]},{"summary":"这个答案的意思是：来自非洲各地的人被强迫成为奴隶，在美国尤其是南方种植园从事强制劳动，直到内战后废除奴隶制。","chunks":[{"en":"People from Africa","zh":"来自非洲的人"},{"en":"(Put together)","zh":"意思是：来自非洲各地的人被强迫成为奴隶，在美国尤其是南方种植园从事强制劳动，直到内战后废除奴隶制。"}]}],"76":[{"summary":"这个答案的意思是：美国革命，指1775-1783年间美国殖民地反抗英国统治的斗争。","chunks":[{"en":"American","zh":"美国的、美洲的"},{"en":"Revolution","zh":"革命（指推翻旧统治的重大变革）"},{"en":"(Put together)","zh":"意思是：美国革命，指1775-1783年间美国殖民地反抗英国统治的斗争。"}]},{"summary":"这个答案的意思是：美国独立战争，也称革命战争，是美国脱离英国殖民统治的武装斗争。","chunks":[{"en":"The","zh":"定冠词"},{"en":"(American)","zh":"美国的（括号内可选）"},{"en":"Revolutionary War","zh":"革命战争（Revolutionary = 革命性的，War = 战争）"},{"en":"(Put together)","zh":"意思是：美国独立战争，也称革命战争，是美国脱离英国殖民统治的武装斗争。"}]},{"summary":"这个答案的意思是：美国独立战争，以争取独立为目标，最终于1783年通过《巴黎条约》获得英国承认。","chunks":[{"en":"War for","zh":"为……而战的战争"},{"en":"(American)","zh":"美国的（括号内可选）"},{"en":"Independence","zh":"独立"},{"en":"(Put together)","zh":"意思是：美国独立战争，以争取独立为目标，最终于1783年通过《巴黎条约》获得英国承认。"}]}],"77":[{"summary":"这个答案的意思是：英国向殖民地征收过高的税，令殖民地居民极为不满。","chunks":[{"en":"High","zh":"高的、过重的"},{"en":"taxes","zh":"税收"},{"en":"(Put together)","zh":"意思是：英国向殖民地征收过高的税，令殖民地居民极为不满。"}]},{"summary":"这个答案的意思是：\"无代表不纳税\"——殖民地人民被英国征税，却在英国议会中没有代表席位，这激起了强烈反抗。","chunks":[{"en":"Taxation","zh":"征税（tax 的名词形式）"},{"en":"without","zh":"没有"},{"en":"representation","zh":"代表权（指在议会中有代表发声的权利）"},{"en":"(Put together)","zh":"意思是：\"无代表不纳税\"——殖民地人民被英国征税，却在英国议会中没有代表席位，这激起了强烈反抗。"}]},{"summary":"这个答案的意思是：英国强迫殖民地居民为士兵提供住宿，这严重侵犯了私人生活和财产权利。","chunks":[{"en":"British soldiers","zh":"英国士兵"},{"en":"stayed in","z     const ITEMS_PER_PAGE = 10;

    const stopPageBtn = document.getElementById("stopPage");

    let readMode = "both"; // 'en' | 'both' | 'zh'
    if (readModeSel) {
      readMode = readModeSel.value;
      readModeSel.addEventListener("change", () => {
        readMode = readModeSel.value;
        stopAutoRead();
      });
    }

    let enRate = 0.9;
    function updateEnRateLabel() {
      if (enRateLabel) enRateLabel.textContent = `${enRate.toFixed(2)}×`;
    }
    if (enRateEl) {
      enRate = parseFloat(enRateEl.value) || 0.9;
      updateEnRateLabel();
      enRateEl.addEventListener("input", () => {
        enRate = parseFloat(enRateEl.value) || 0.9;
        updateEnRateLabel();
      });
    }

    function normalizeItem(item) {
      let noteEn = "";
      let answersEn = item.a.slice();
      const noteIdx = answersEn.findIndex((t) => t.includes("For a complete list of tribes"));
      if (noteIdx >= 0) {
        const parts = answersEn[noteIdx].split(" For a complete list of tribes, please visit bia.gov.");
        answersEn[noteIdx] = parts[0].trim();
        noteEn = "For a complete list of tribes, please visit bia.gov.";
      }

      const zh = ZH_DATA[item.id] || { q: "", a: [] };
      const answers = answersEn.map((en, i) => ({
        en,
        zh: zh.a[i] || "",
      }));

      return {
        ...item,
        q_zh: zh.q || "",
        answers,
        starred: STAR_IDS.has(item.id),
        note_en: noteEn,
        note_zh: zh.note || "",
      };
    }

    const DATA = EN_DATA.map(normalizeItem);

    function speak(en, zh) {
      if (!window.speechSynthesis) return;
      const synth = window.speechSynthesis;
      synth.cancel();

      const enText = (en || "").trim();
      const zhText = (zh || "").trim();

      // Modes:
      // - en: English only
      // - both: English then Chinese (if available)
      // - zh: Chinese only (falls back to English if no zh)
      if (readMode === "zh") {
        const t = zhText || enText;
        if (!t) return;
        const u = new SpeechSynthesisUtterance(t);
        u.lang = zhText ? "zh-CN" : "en-US";
        u.rate = zhText ? 0.9 : enRate;
        synth.speak(u);
        return;
      }

      if (readMode === "en") {
        if (!enText) return;
        const u = new SpeechSynthesisUtterance(enText);
        u.lang = "en-US";
        u.rate = enRate;
        synth.speak(u);
        return;
      }

      // both
      if (!enText && !zhText) return;
      if (enText) {
        const u1 = new SpeechSynthesisUtterance(enText);
        u1.lang = "en-US";
        u1.rate = enRate;
        synth.speak(u1);
      }
      if (zhText) {
        const u2 = new SpeechSynthesisUtterance(zhText);
        u2.lang = "zh-CN";
        u2.rate = 0.9;
        synth.speak(u2);
      }
    }

    function makeEl(tag, className, text) {
      const el = document.createElement(tag);
      if (className) el.className = className;
      if (text !== undefined) el.textContent = text;
      return el;
    }

    function getCurrentPageItems() {
      const start = (page - 1) * ITEMS_PER_PAGE;
      return DATA.slice(start, start + ITEMS_PER_PAGE);

    // v2 learning/explain state
    let expandedId = null;

    const explain = {

    function stopExplainRead() {
      explain.active = false;
      explain.segments = [];
      explain.idx = 0;
      if (window.speechSynthesis) window.speechSynthesis.cancel();
    }

    function speakQueue(segments, onDone) {
      if (!window.speechSynthesis) return;
      const synth = window.speechSynthesis;
      synth.cancel();

      let i = 0;
      function next() {
        if (i >= segments.length) {
          if (onDone) onDone();
          return;
        }
        const seg = segments[i++];
        if (!seg || !seg.text) {
          next();
          return;
        }
        const u = new SpeechSynthesisUtterance(seg.text);
        u.lang = seg.lang || "en-US";
        u.rate = seg.rate || 1.0;
        u.onend = () => next();
        u.onerror = () => next();
        synth.speak(u);
      }
      next();
    }

    function cleanZh(s) {
      return (s || "")
        .replace(/^[\s\u3000]+/, "")
        .replace(/[？?。！!]+$/g, "")
        .trim();
    }

    function stripZhLead(zh, leadRegexList) {
      let out = cleanZh(zh);
      for (const re of leadRegexList) {
        const next = out.replace(re, "").trim();
        if (next !== out) {
          out = next;
          break;
        }
      }
      return out;
    }

    // (Removed) separate "答案解释" feature: we only keep per-answer 学习/讲解.

    function shortenZh(s, max = 16) {
      const t = cleanZh(s);
      if (!t) return "";
      return t.length > max ? t.slice(0, max) + "…" : t;
    }

    function splitZhParts(zh) {
      const t = cleanZh(zh);
      if (!t) return { head: "", rest: "" };
      // split at common delimiters for a short "keyword" + remainder
      const m = t.split(/（|\(|，|、|。|；|:|：/);
      const head = (m[0] || "").trim();
      const rest = t.slice(head.length).replace(/^[\s，、。；:：]+/, "").trim();
      return { head, rest };
    }

    function splitEnAnswer(en) {
      const t = (en || "").trim();
      if (!t) return { head: "", rest: "" };
      // If has parentheses, treat as head + note
      const pm = t.match(/^(.*?)(\s*\(([^)]+)\)\s*)$/);
      if (pm) {
        return { head: pm[1].trim(), rest: `(${pm[3]})` };
      }
      // Split by sentence-ish punctuation first
      const p = t.split(/[.;!?]/).map((x) => x.trim()).filter(Boolean);
      if (p.length > 1) {
        return { head: p[0], rest: p.slice(1).join(". ") };
      }
      // Otherwise take first 3-5 words as a "phrase" head
      const words = t.split(/\s+/).filter(Boolean);
      if (words.length <= 4) return { head: t, rest: "" };
      return { head: words.slice(0, 4).join(" "), rest: words.slice(4).join(" ") };
    }

    function buildAnswerLearn(item, ans, idx) {
      // Use hand-crafted static data from LEARN_DATA (parsed from learn_content.md)
      const entry = LEARN_DATA[item.id];
      if (entry && entry[idx]) return entry[idx];
      // Fallback for any missing entry
      const enA = (ans.en || "").trim();
      const zhA = (ans.zh || "").trim();
      const summary = zhA ? `这个答案的意思是：${shortenZh(zhA, 22)}。` : "这个答案的意思是：一个可接受的回答。";
      return { summary, chunks: [{ en: enA, zh: zhA }] };
    }

    function renderAnswerLearnPanel(item, ans, idx) {

      const wrap = makeEl("div", "ansLearnPanel");

      for (const ch of learn.chunks) {
        if (ch.en === "(Put together)") continue;
        const row = makeEl("div", "chunk");
        row.appendChild(makeEl("div", "chunkEn", ch.en));
        row.appendChild(makeEl("div", "chunkZh", ch.zh));
        chunkWrap.appendChild(row);
      }
      panel.appendChild(chunkWrap);

      const actions = makeEl("div", "learnActions");
      const play = makeEl("button", "learnbtn", "按块朗读（英文→中文）");
      play.dataset.action = "play-ans-chunks";
      play.dataset.id = String(item.id);
      play.dataset.idx = String(idx);
      actions.appendChild(play);

      const stop = makeEl("button", "learnbtn", "停止");
      stop.dataset.action = "stop-chunks";
      actions.appendChild(stop);

      panel.appendChild(actions);
      panel.appendChild(makeEl("div", "learnNote", "提示：先听英文，再听中文解释。"));

      return wrap;
    }

    function playAnswerChunksFor(item, ans, idx) {
      const learn = buildAnswerLearn(item, ans, idx);
      const segs = [];
      for (const ch of learn.chunks) {
        if (ch.en === "(Put together)") continue;
        if (ch.en) segs.push({ text: ch.en, lang: "en-US", rate: enRate });
        if (ch.zh) segs.push({ text: ch.zh, lang: "zh-CN", rate: 0.95 });
      }
      speakQueue(segs);
    }

    function buildLearn(item) {
      const zhQ = item.q_zh || "";
      const summary = zhQ ? `这题在问：${shortenZh(zhQ, 26)}？` : `这题在问：${item.q}`;

      const enQRaw = (item.q || "").trim();
      const enQ = enQRaw.replace(/[?？]+$/g, "").trim();

      const patterns = [
        {
          re: /^What is\b/i,
          lead: "What is",
          leadZh: "表示：是什么",
          zhStrip: [/^什么是/, /^（?美国）?的?政府形式是什么/],
        },
        {
          re: /^What are\b/i,
          lead: "What are",
          leadZh: "表示：是什么（复数）",
          zhStrip: [/^什么是/, /^什么是.*？?$/],
        },
        {
          re: /^How many\b/i,
          lead: "How many",
          leadZh: "表示：有多少",
          zhStrip: [/^有多少/, /^多少/],
        },
        {
          re: /^How long\b/i,
          lead: "How long",
          leadZh: "表示：多长（多久/多少年）",
          zhStrip: [/^多长/, /^多少年/, /^任期多少年/],
        },
        {
          re: /^Who\b/i,
          lead: "Who",
          leadZh: "表示：谁",
          zhStrip: [/^谁/],
        },
        {
          re: /^When\b/i,
          lead: "When",
          leadZh: "表示：什么时候",
          zhStrip: [/^(何时|什么时候|何年|哪一年)/],
        },
        {
          re: /^Where\b/i,
          lead: "Where",
          leadZh: "表示：在哪里",
          zhStrip: [/^在哪里/],
        },
        {
          re: /^Why\b/i,
          lead: "Why",
          leadZh: "表示：为什么",
          zhStrip: [/^为什么/],
        },
        {
          re: /^Name\b/i,
          lead: "Name",
          leadZh: "表示：说出/列举",
          zhStrip: [/^说出/, /^列出/],
        },
        {
          re: /^Describe\b/i,
          lead: "Describe",
          leadZh: "表示：描述",
          zhStrip: [/^描述/],
        },
      ];

      let lead = null;
      for (const p of patterns) {
        if (p.re.test(enQ)) {
          lead = p;
          break;
        }
      }

      // Chunking: explain roles (问法/关键词/限定条件) instead of direct translation.
      let chunks = [];
      if (lead) {
        const rest = enQ.replace(lead.re, "").trim();
        const coreZh = zhQ ? stripZhLead(zhQ, lead.zhStrip) : "";

        // 1) Question frame
        chunks.push({
          en: lead.lead + " … ?",
          zh: lead.leadZh.replace(/^表示：/, "这是在问："),
        });

        // 2) Break the rest by a few common, senior-friendly patterns.
        if (rest) {
          let r = rest;

          // phrase-level patterns (keep these as explicit, because they are common in civics)
          const phraseMap = [
            { re: /\bof the land\b/i, en: "of the land", zh: "限定范围：这个国家的" },
            { re: /\bin the United States\b/i, en: "in the United States", zh: "限定范围：在美国" },
            { re: /\bof the United States\b/i, en: "of the United States", zh: "限定范围：美国的" },
            { re: /\bof the Constitution\b/i, en: "of the Constitution", zh: "限定范围：宪法的" },
            { re: /\bnow\b/i, en: "now", zh: "时间提示：现在/现任" },
          ];

          // find earliest phrase occurrence
          function findEarliestPhrase(text) {
            let best = null;
            for (const p of phraseMap) {
              const m = text.match(p.re);
              if (m && m.index !== undefined) {
                if (!best || m.index < best.idx) best = { ...p, idx: m.index, len: m[0].length };
              }
            }
            return best;
          }

          let safety = 0;
          while (r && safety++ < 8) {
            const best = findEarliestPhrase(r);
            if (!best) {
              const kw = r.trim();
              if (kw) {
                chunks.push({
                  en: kw,
                  zh: coreZh ? `关键词：${shortenZh(coreZh, 22)}` : "关键词：题目核心对象",
                });
              }
              break;
            }

            const before = r.slice(0, best.idx).trim();
            if (before) {
              chunks.push({
                en: before,
                zh: coreZh ? `关键词：${shortenZh(coreZh, 22)}` : "关键词：题目核心对象",
              });
            }

            chunks.push({ en: best.en, zh: best.zh });
            r = r.slice(best.idx + best.len).trim();
          }
        }

        // 3) Stitching hint (super important for non-English learners)
        if (zhQ) {
          chunks.push({ en: "(Put together)", zh: `所以整句意思是：${shortenZh(zhQ, 28)}` });
        } else {
          chunks.push({ en: "(Put together)", zh: "所以整句意思是：问一个定义/名称" });
        }
      } else {
        // Fallback
        chunks = [
          { en: enQ || "(empty)", zh: zhQ ? `意思是：${shortenZh(zhQ, 26)}` : "意思是：这道题的内容" },
        ];
      }

      return { summary, chunks };
    }

    function renderLearnPanel(item) {
      const learn = buildLearn(item);

      const panel = makeEl("div", "learnpanel");
      panel.dataset.learnPanel = String(item.id);

      panel.appendChild(makeEl("div", "learnTitle", learn.summary));

      const chunkWrap = makeEl("div", "chunks");
      for (const ch of learn.chunks) {
        if (ch.en === "(Put together)") continue;
        const row = makeEl("div", "chunk");
        row.appendChild(makeEl("div", "chunkEn", ch.en));
        row.appendChild(makeEl("div", "chunkZh", ch.zh));
        chunkWrap.appendChild(row);
      }
      panel.appendChild(chunkWrap);

      const actions = makeEl("div", "learnActions");
      const play = makeEl("button", "learnbtn", "按块朗读（英文→中文）");
      play.dataset.action = "play-chunks";
      play.dataset.id = String(item.id);
      actions.appendChild(play);

      const stop = makeEl("button", "learnbtn", "停止");
      stop.dataset.action = "stop-chunks";
      stop.dataset.id = String(item.id);
      actions.appendChild(stop);

      panel.appendChild(actions);
      panel.appendChild(makeEl("div", "learnNote", "提示：先听英文，再听中文解释（不用懂语法）。"));

      return panel;
    }

    function playChunksFor(item) {
      const learn = buildLearn(item);
      const segs = [];
      for (const ch of learn.chunks) {
        if (ch.en && !/^\(.*\)$/.test(ch.en)) segs.push({ text: ch.en, lang: "en-US", rate: enRate });
        if (ch.zh) segs.push({ text: ch.zh, lang: "zh-CN", rate: 0.95 });
      }
      speakQueue(segs);
    }

    function render() {
      stopAutoRead();
      stopExplainRead();

      list.innerHTML = "";
      const totalPages = Math.ceil(DATA.length / ITEMS_PER_PAGE);
      const items = getCurrentPageItems();

      pager.textContent = `Page ${page} / ${totalPages}`;
      prevBtn.disabled = page === 1;
      nextBtn.disabled = page === totalPages;

      let lastSection = null;
      let lastSub = null;

      for (const item of items) {
        if (item.section !== lastSection) {
          list.appendChild(makeEl("div", "section", item.section));
          lastSection = item.section;
          lastSub = null;
        }
        if (item.subsection !== lastSub) {
          list.appendChild(makeEl("div", "subsection", item.subsection));
          lastSub = item.subsection;
        }

        const card = makeEl("div", "card");
        const qRow = makeEl("div", "question");
        const num = makeEl("div", "num", item.id + ".");
        const qText = makeEl("div", "qtext");
        qText.dataset.en = item.q;
        qText.dataset.zh = item.q_zh;

        const qEn = makeEl("div", "en", item.q);
        const qZh = makeEl("div", "zh", item.q_zh);
        qText.appendChild(qEn);
        qText.appendChild(qZh);
        if (item.starred) {
          const badge = makeEl("span", "badge", "* 65/20");
          qEn.appendChild(badge);
        }

        qRow.appendChild(num);
        qRow.appendChild(qText);
        card.appendChild(qRow);

        // v2: learning/explain (collapsed by default)
        const learnbar = makeEl("div", "learnbar");
        const learnBtn = makeEl("button", "learnbtn primary", expandedId === item.id ? "收起讲解" : "学习/讲解");
        learnBtn.dataset.action = "toggle-learn";
        learnBtn.dataset.id = String(item.id);
        learnbar.appendChild(learnBtn);
        const learnHint = makeEl("span", "learnNote", "点开看分段解释（适合零基础）");
        learnHint.style.marginTop = "0";
        learnHint.style.marginLeft = "4px";
        learnbar.appendChild(learnHint);
        card.appendChild(learnbar);

        if (expandedId === item.id) {
          const panel = renderLearnPanel(item);
          card.appendChild(panel);
        }

        const answers = makeEl("ul", "answers");
        item.answers.forEach((ans, idx) => {
          const li = makeEl("li");
          li.dataset.en = ans.en;
          li.dataset.zh = ans.zh;

          const top = makeEl("div", "ansTop");
          const textWrap = makeEl("div", "ansText");
          textWrap.appendChild(makeEl("div", "en", ans.en));
          textWrap.appendChild(makeEl("div", "zh", ans.zh));
          top.appendChild(textWrap);

          const key = `${item.id}-${idx}`;

          // v2: per-answer learn/explain button (same concept as question)
          const learnBtn = makeEl("button", "ansExplainBtn", expandedAnsLearnKey === key ? "收起讲解" : "学习/讲解");
          learnBtn.dataset.action = "toggle-ans-learn";
          learnBtn.dataset.key = key;
          learnBtn.dataset.id = String(item.id);
          learnBtn.dataset.idx = String(idx);
          top.appendChild(learnBtn);



          li.appendChild(top);

          if (expandedAnsLearnKey === key) {
            li.appendChild(renderAnswerLearnPanel(item, ans, idx));
          }


          answers.appendChild(li);
        });
        card.appendChild(answers);

        if (item.note_en || item.note_zh) {
          const note = makeEl("div", "note");
          if (item.note_en) note.appendChild(makeEl("div", "en", item.note_en));
          if (item.note_zh) note.appendChild(makeEl("div", "zh", item.note_zh));
          card.appendChild(note);
        }

        list.appendChild(card);
      }
    }

    // ---------- Auto-read (page) ----------
    const auto = {
      active: false,
      segments: [],
      idx: 0,
      loopsLeft: 1, // number | Infinity
    };

    function setAutoUI(active) {
      if (playPageBtn) playPageBtn.disabled = active;
      if (stopPageBtn) stopPageBtn.disabled = !active;
      if (readModeSel) readModeSel.disabled = active;
      if (loopCountEl) loopCountEl.disabled = active;
      // allow changing speed while reading
    }

    function makeSegmentsForText(en, zh) {
      const enText = (en || "").trim();
      const zhText = (zh || "").trim();
      const segs = [];

      if (readMode === "en") {
        if (enText) segs.push({ text: enText, lang: "en-US", rate: enRate });
        return segs;
      }

      if (readMode === "zh") {
        const t = zhText || enText;
        if (t) segs.push({ text: t, lang: zhText ? "zh-CN" : "en-US", rate: zhText ? 0.9 : enRate });
        return segs;
      }

      // both
      if (enText) segs.push({ text: enText, lang: "en-US", rate: enRate });
      if (zhText) segs.push({ text: zhText, lang: "zh-CN", rate: 0.9 });
      return segs;
    }

    function buildPageSegments(items) {
      const segs = [];
      for (const item of items) {
        segs.push(...makeSegmentsForText(item.q, item.q_zh));
        for (const ans of item.answers) {
          segs.push(...makeSegmentsForText(ans.en, ans.zh));
        }
        if (item.note_en || item.note_zh) {
          segs.push(...makeSegmentsForText(item.note_en, item.note_zh));
        }
      }
      return segs;
    }

    function speakSegment(seg, onDone) {
      if (!window.speechSynthesis) return;
      const u = new SpeechSynthesisUtterance(seg.text);
      u.lang = seg.lang;
      u.rate = seg.rate;
      u.onend = () => onDone && onDone();
      u.onerror = () => onDone && onDone();
      window.speechSynthesis.speak(u);
    }

    function stepAutoRead() {
      if (!auto.active) return;
      if (!window.speechSynthesis) return;

      if (auto.idx >= auto.segments.length) {
        auto.loopsLeft = auto.loopsLeft === Infinity ? Infinity : auto.loopsLeft - 1;
        if (auto.loopsLeft <= 0) {
          stopAutoRead();
          return;
        }
        auto.idx = 0;
      }

      const seg = auto.segments[auto.idx++];
      if (!seg || !seg.text) {
        stepAutoRead();
        return;
      }
      speakSegment(seg, () => stepAutoRead());
    }

    function startAutoRead() {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();

      const items = getCurrentPageItems();
      auto.segments = buildPageSegments(items);
      auto.idx = 0;

      const lc = loopCountEl ? loopCountEl.value : "1";
      auto.loopsLeft = lc === "inf" ? Infinity : Math.max(1, parseInt(lc, 10) || 1);

      auto.active = true;
      setAutoUI(true);
      stepAutoRead();
    }

    function stopAutoRead() {
      if (!auto.active && window.speechSynthesis) {
        // still stop any leftover speech
        window.speechSynthesis.cancel();
        setAutoUI(false);
        return;
      }
      auto.active = false;
      auto.segments = [];
      auto.idx = 0;
      auto.loopsLeft = 1;
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      setAutoUI(false);
    }

    if (playPageBtn) playPageBtn.addEventListener("click", () => startAutoRead());
    if (stopPageBtn) stopPageBtn.addEventListener("click", () => stopAutoRead());

    // Click handling (learning buttons + click-to-speak)
    list.addEventListener("click", (e) => {
      const actionEl = e.target.closest("[data-action]");
      if (actionEl) {
        const action = actionEl.dataset.action;
        const id = parseInt(actionEl.dataset.id || "", 10);
        const item = DATA.find((x) => x.id === id);

        if (action === "toggle-learn") {
          stopAutoRead();
          stopExplainRead();
          expandedAnsLearnKey = null;
          expandedId = expandedId === id ? null : id;
          render();
          // bring panel into view for seniors
          setTimeout(() => {
            const panel = list.querySelector(`[data-learn-panel='${id}']`);
            if (panel) panel.scrollIntoView({ behavior: "smooth", block: "center" });
          }, 0);
          return;
        }


        if (action === "toggle-ans-learn") {
          stopAutoRead();
          stopExplainRead();
          const key = actionEl.dataset.key;
          expandedAnsLearnKey = expandedAnsLearnKey === key ? null : key;
          render();
          return;
        }

        if (action === "play-chunks" && item) {
          stopAutoRead();
          stopExplainRead();
          playChunksFor(item);
          return;
        }

        if (action === "play-ans-chunks" && item) {
          stopAutoRead();
          stopExplainRead();
          const idx = parseInt(actionEl.dataset.idx || "", 10);
          if (!Number.isNaN(idx) && item.answers && item.answers[idx]) {
            playAnswerChunksFor(item, item.answers[idx], idx);
          }
          return;
        }

        if (action === "stop-chunks") {
          stopAutoRead();
          stopExplainRead();
          return;
        }
      }

      // default: click-to-speak (single item)
      stopAutoRead();
      stopExplainRead();
      const target = e.target.closest("[data-en]");
      if (!target) return;
      speak(target.dataset.en, target.dataset.zh);
    });

    prevBtn.addEventListener("click", () => {
      if (page > 1) {
        page -= 1;
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    });

    nextBtn.addEventListener("click", () => {
      const totalPages = Math.ceil(DATA.length / ITEMS_PER_PAGE);
      if (page < totalPages) {
        page += 1;
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    });

    render();
  </script>
</body>
</html>
